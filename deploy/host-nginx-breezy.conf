# =============================================================================
#  vhost nginx HÔTE pour breezy.mxrine-mz.dev  (VPS partagé)
# =============================================================================
#  À déployer sur la machine hôte (PAS dans un conteneur) :
#    sudo cp deploy/host-nginx-breezy.conf /etc/nginx/sites-available/breezy.mxrine-mz.dev
#    sudo ln -s /etc/nginx/sites-available/breezy.mxrine-mz.dev /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Puis (une fois le DNS résolu vers 91.134.133.186) émettre le certificat :
#    sudo certbot --nginx -d breezy.mxrine-mz.dev
#  → certbot ajoute automatiquement le bloc 443 + la redirection 80→443
#    et recharge nginx. Renouvellement géré par le timer certbot existant.
#
#  Ce vhost ne fait que TERMINER LE TLS et proxifier tout le trafic vers la
#  passerelle Breezy (conteneur nginx) sur 127.0.0.1:8090, qui route ensuite
#  vers le frontend, les microservices /api/* et /uploads.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name breezy.mxrine-mz.dev;

    # client_max_body_size aligné sur l'upload média (50M).
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# NB : après `sudo certbot --nginx -d breezy.mxrine-mz.dev`, certbot insère
# ici un second `server { listen 443 ssl; ... }` avec les chemins du certificat
# et bascule le bloc port 80 en redirection. Rien d'autre à faire à la main.
