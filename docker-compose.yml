version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: breezy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: breezy
      POSTGRES_USER: breezy
      POSTGRES_PASSWORD: breezy
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: breezy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
