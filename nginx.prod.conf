events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------------
    # Passerelle Breezy — point d'entrée UNIQUE (front + API + uploads).
    #
    # Déploiement sur VPS PARTAGÉ : ce conteneur écoute en interne (port 80
    # du conteneur, publié sur 127.0.0.1:8090 côté hôte). C'est le nginx HÔTE
    # (systemd) qui termine le TLS pour breezy.mxrine-mz.dev et proxifie vers
    # http://127.0.0.1:8090. Pas de 443 ici, pas de certificat ici.
    # ------------------------------------------------------------------

    # SPA : chaque post résout son auteur → beaucoup d'appels /api par page.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # Inscription : limite stricte par IP contre la création massive de comptes (bots).
    # ~10 comptes/min par IP, avec un burst de 20 pour tolérer un réseau partagé (NAT école).
    limit_req_zone $binary_remote_addr zone=register:10m rate=10r/m;

    # Logs vers stdout/stderr (récupérables via `docker compose logs nginx`).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 80;
        server_name breezy.mxrine-mz.dev;

        # Résolveur DNS interne de Docker : résout les noms de services à chaque
        # requête (proxy_pass avec variable) → pas de plantage si un service est
        # momentanément down ni d'IP périmée après un restart.
        resolver 127.0.0.11 valid=10s ipv6=off;

        client_max_body_size 50M;

        # CORS — même origine en prod (le front et l'API sont sous le même
        # domaine), conservé surtout pour cohérence/preflight.
        add_header Access-Control-Allow-Origin "https://breezy.mxrine-mz.dev" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        if ($request_method = 'OPTIONS') { return 204; }

        # En-têtes de sécurité (HSTS est posé par le nginx hôte, sur le 443).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- API : un location par service ----
        # Inscription : limite dédiée bien plus stricte (anti création massive de comptes).
        # Le match exact `=` prend le pas sur le préfixe `/api/auth`.
        location = /api/auth/register {
            limit_req zone=register burst=20 nodelay;
            set $upstream_auth_reg auth-service:3001;
            proxy_pass http://$upstream_auth_reg;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/auth {
            limit_req zone=auth burst=20 nodelay;
            set $upstream_auth auth-service:3001;
            proxy_pass http://$upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/users {
            limit_req zone=general burst=100 nodelay;
            set $upstream_user user-service:3002;
            proxy_pass http://$upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/posts {
            limit_req zone=general burst=100 nodelay;
            set $upstream_post post-service:3003;
            proxy_pass http://$upstream_post;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/tags {
            limit_req zone=general burst=100 nodelay;
            set $upstream_tag tag-service:3004;
            proxy_pass http://$upstream_tag;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/notifications {
            limit_req zone=general burst=100 nodelay;
            set $upstream_notification notification-service:3005;
            proxy_pass http://$upstream_notification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/dms {
            limit_req zone=general burst=100 nodelay;
            set $upstream_dm dm-service:3006;
            proxy_pass http://$upstream_dm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/media {
            limit_req zone=general burst=100 nodelay;
            set $upstream_media media-service:3007;
            proxy_pass http://$upstream_media;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }
        location /api/moderation {
            limit_req zone=general burst=100 nodelay;
            set $upstream_moderation moderation-service:3008;
            proxy_pass http://$upstream_moderation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/health {
            set $upstream_health auth-service:3001;
            proxy_pass http://$upstream_health;
            proxy_set_header Host $host;
        }

        # ---- Médias uploadés (publics : <img>/<video> sans Authorization) ----
        location /uploads {
            set $upstream_uploads media-service:3007;
            proxy_pass http://$upstream_uploads;
        }

        # ---- Frontend Next.js (tout le reste) ----
        location / {
            set $upstream_frontend frontend:3000;
            proxy_pass http://$upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
