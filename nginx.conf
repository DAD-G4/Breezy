events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    # (relevées : une SPA résout l'auteur de chaque post → beaucoup de requêtes /api par chargement)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    server {
        listen 80;

        # Résolveur DNS de Docker : permet de résoudre les noms de services à
        # CHAQUE requête (via proxy_pass avec variable) plutôt qu'une seule fois
        # au démarrage. nginx ne plante donc plus si un service est momentanément
        # down et ne garde pas d'IP périmée après un rebuild/restart de service.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # CORS headers
        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth routes (rate limited)
        location /api/auth {
            limit_req zone=auth burst=20 nodelay;
            set $upstream_auth auth-service:3001;
            proxy_pass http://$upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User routes
        location /api/users {
            limit_req zone=general burst=100 nodelay;
            set $upstream_user user-service:3002;
            proxy_pass http://$upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Post routes
        location /api/posts {
            limit_req zone=general burst=100 nodelay;
            set $upstream_post post-service:3003;
            proxy_pass http://$upstream_post;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tag routes
        location /api/tags {
            limit_req zone=general burst=100 nodelay;
            set $upstream_tag tag-service:3004;
            proxy_pass http://$upstream_tag;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification routes
        location /api/notifications {
            limit_req zone=general burst=100 nodelay;
            set $upstream_notification notification-service:3005;
            proxy_pass http://$upstream_notification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # DM routes
        location /api/dms {
            limit_req zone=general burst=100 nodelay;
            set $upstream_dm dm-service:3006;
            proxy_pass http://$upstream_dm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Media routes
        location /api/media {
            limit_req zone=general burst=100 nodelay;
            set $upstream_media media-service:3007;
            proxy_pass http://$upstream_media;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # Moderation routes
        location /api/moderation {
            limit_req zone=general burst=100 nodelay;
            set $upstream_moderation moderation-service:3008;
            proxy_pass http://$upstream_moderation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /api/health {
            set $upstream_health auth-service:3001;
            proxy_pass http://$upstream_health;
            proxy_set_header Host $host;
        }

        # Static media files (publics : les balises <img>/<video> ne peuvent pas
        # envoyer de header Authorization, donc on sert les médias sans auth_request).
        location /uploads {
            set $upstream_uploads media-service:3007;
            proxy_pass http://$upstream_uploads;
        }

        location = /uploads-auth {
            internal;
            set $upstream_uploads_auth media-service:3007;
            proxy_pass http://$upstream_uploads_auth/media/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}
