events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:3001;
    }
    upstream user_service {
        server user-service:3002;
    }
    upstream post_service {
        server post-service:3003;
    }
    upstream tag_service {
        server tag-service:3004;
    }
    upstream notification_service {
        server notification-service:3005;
    }
    upstream dm_service {
        server dm-service:3006;
    }
    upstream media_service {
        server media-service:3007;
    }
    upstream moderation_service {
        server moderation-service:3008;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    server {
        listen 80;

        # CORS headers
        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth routes (rate limited)
        location /api/auth {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User routes
        location /api/users {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Post routes
        location /api/posts {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://post_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tag routes
        location /api/tags {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://tag_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification routes
        location /api/notifications {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # DM routes
        location /api/dms {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://dm_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Media routes
        location /api/media {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://media_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # Moderation routes
        location /api/moderation {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://moderation_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /api/health {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
        }

        # Static media files
        location /uploads {
            proxy_pass http://media_service;
        }
    }
}
